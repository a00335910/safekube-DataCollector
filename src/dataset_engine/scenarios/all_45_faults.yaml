# SafeKube Dataset Engine — 45 Fault Scenario Definitions
# Each scenario defines: fault type, Chaos Mesh experiment spec, target, duration, collect window
# Run via: python -m src.dataset_engine.scenario_runner --scenario all_45_faults.yaml

metadata:
  name: all_45_faults
  description: Complete 45-fault type dataset generation for SafeKube classifier training
  namespace: staging
  collect_window_minutes: 15
  cooldown_seconds: 20        # wait between scenarios for cluster to stabilize
  runs_per_fault: 3           # collect 3 incidents per fault type = 135 total bundles
  target_services:
    - cartservice
    - frontend
    - checkoutservice
    - productcatalogservice
    - paymentservice

scenarios:

  # ─── PodChaos ────────────────────────────────────────────────────────────────

  - name: pod_kill
    fault_type: pod_kill
    chaos_kind: PodChaos
    spec:
      action: pod-kill
      mode: one
      gracePeriod: 0
    duration: 30s

  - name: pod_failure
    fault_type: pod_failure
    chaos_kind: PodChaos
    spec:
      action: pod-failure
      mode: one
    duration: 60s

  - name: container_kill
    fault_type: container_kill
    chaos_kind: PodChaos
    spec:
      action: container-kill
      mode: one
      containerNames: []       # filled in by runner for each target service
    duration: 30s

  - name: oomkilled
    fault_type: oomkilled
    chaos_kind: StressChaos
    spec:
      mode: one
      stressors:
        memory:
          workers: 4
          size: "512MB"        # exceeds typical container limit
    duration: 90s

  - name: crashloop_backoff
    fault_type: crashloop_backoff
    chaos_kind: PodChaos
    spec:
      action: pod-failure
      mode: one
    duration: 120s             # long enough for multiple restart cycles

  - name: image_pull_backoff
    fault_type: image_pull_backoff
    chaos_kind: k8s_api        # handled by patching image ref, not Chaos Mesh
    duration: 60s

  - name: readiness_probe_fail
    fault_type: readiness_probe_fail
    chaos_kind: k8s_api        # patch probe to failing path
    duration: 90s

  - name: liveness_probe_fail
    fault_type: liveness_probe_fail
    chaos_kind: k8s_api        # patch probe to failing path
    duration: 90s

  - name: pod_pending
    fault_type: pod_pending
    chaos_kind: k8s_api        # patch resource request to exceed node capacity
    duration: 60s

  - name: pod_eviction
    fault_type: pod_eviction
    chaos_kind: StressChaos
    spec:
      mode: all
      stressors:
        memory:
          workers: 2
          size: "200MB"        # triggers memory pressure → eviction
    duration: 60s

  # ─── StressChaos ─────────────────────────────────────────────────────────────

  - name: cpu_throttling
    fault_type: cpu_throttling
    chaos_kind: StressChaos
    spec:
      mode: one
      stressors:
        cpu:
          workers: 2
          load: 80             # 80% CPU load
    duration: 120s

  - name: cpu_spike
    fault_type: cpu_spike
    chaos_kind: StressChaos
    spec:
      mode: one
      stressors:
        cpu:
          workers: 4
          load: 100
    duration: 30s

  - name: memory_pressure
    fault_type: memory_pressure
    chaos_kind: StressChaos
    spec:
      mode: one
      stressors:
        memory:
          workers: 2
          size: "256MB"
    duration: 120s

  - name: memory_leak_simulation
    fault_type: memory_leak_simulation
    chaos_kind: StressChaos
    spec:
      mode: one
      stressors:
        memory:
          workers: 1
          size: "50MB"         # starts small — runner increases over time
    duration: 180s

  - name: memory_oom_boundary
    fault_type: memory_oom_boundary
    chaos_kind: StressChaos
    spec:
      mode: one
      stressors:
        memory:
          workers: 3
          size: "400MB"        # just under typical OOM threshold
    duration: 90s

  - name: cpu_multi_worker_stress
    fault_type: cpu_multi_worker_stress
    chaos_kind: StressChaos
    spec:
      mode: one
      stressors:
        cpu:
          workers: 8
          load: 100
    duration: 60s

  - name: combined_cpu_memory_stress
    fault_type: combined_cpu_memory_stress
    chaos_kind: StressChaos
    spec:
      mode: one
      stressors:
        cpu:
          workers: 4
          load: 80
        memory:
          workers: 2
          size: "256MB"
    duration: 90s

  - name: worker_thread_exhaustion
    fault_type: worker_thread_exhaustion
    chaos_kind: StressChaos
    spec:
      mode: one
      stressors:
        cpu:
          workers: 16
          load: 100
    duration: 60s

  # ─── NetworkChaos ─────────────────────────────────────────────────────────────

  - name: dns_failure
    fault_type: dns_failure
    chaos_kind: DNSChaos
    spec:
      action: error
      mode: one
      patterns:
        - "*.staging.svc.cluster.local"
    duration: 60s

  - name: dns_random_response
    fault_type: dns_random_response
    chaos_kind: DNSChaos
    spec:
      action: random
      mode: one
    duration: 60s

  - name: network_latency_low
    fault_type: network_latency_low
    chaos_kind: NetworkChaos
    spec:
      action: delay
      mode: one
      delay:
        latency: "80ms"
        jitter: "10ms"
    duration: 120s

  - name: network_latency_high
    fault_type: network_latency_high
    chaos_kind: NetworkChaos
    spec:
      action: delay
      mode: one
      delay:
        latency: "800ms"
        jitter: "100ms"
    duration: 120s

  - name: network_latency_jitter
    fault_type: network_latency_jitter
    chaos_kind: NetworkChaos
    spec:
      action: delay
      mode: one
      delay:
        latency: "50ms"
        jitter: "40ms"
        correlation: "50"
    duration: 120s

  - name: network_packet_loss_low
    fault_type: network_packet_loss_low
    chaos_kind: NetworkChaos
    spec:
      action: loss
      mode: one
      loss:
        loss: "15"
        correlation: "25"
    duration: 120s

  - name: network_packet_loss_high
    fault_type: network_packet_loss_high
    chaos_kind: NetworkChaos
    spec:
      action: loss
      mode: one
      loss:
        loss: "60"
        correlation: "50"
    duration: 90s

  - name: network_partition
    fault_type: network_partition
    chaos_kind: NetworkChaos
    spec:
      action: partition
      mode: one
      direction: both
    duration: 60s

  - name: network_bandwidth_limit
    fault_type: network_bandwidth_limit
    chaos_kind: NetworkChaos
    spec:
      action: bandwidth
      mode: one
      bandwidth:
        rate: "1mbps"
        limit: 20971520
        buffer: 10000
    duration: 120s

  - name: network_packet_corrupt
    fault_type: network_packet_corrupt
    chaos_kind: NetworkChaos
    spec:
      action: corrupt
      mode: one
      corrupt:
        corrupt: "5"
        correlation: "5"
    duration: 30s

  # ─── HTTPChaos ────────────────────────────────────────────────────────────────

  - name: http_abort
    fault_type: http_abort
    chaos_kind: HTTPChaos
    spec:
      mode: one
      target: Request
      port: 8080
      abort: true
    duration: 60s

  - name: http_delay
    fault_type: http_delay
    chaos_kind: HTTPChaos
    spec:
      mode: one
      target: Response
      port: 8080
      delay: "3s"
    duration: 120s

  - name: http_error_500
    fault_type: http_error_500
    chaos_kind: HTTPChaos
    spec:
      mode: one
      target: Response
      port: 8080
      replace:
        code: 500
    duration: 90s

  - name: http_error_503
    fault_type: http_error_503
    chaos_kind: HTTPChaos
    spec:
      mode: one
      target: Response
      port: 8080
      replace:
        code: 503
    duration: 90s

  - name: http_body_corrupt
    fault_type: http_body_corrupt
    chaos_kind: HTTPChaos
    spec:
      mode: one
      target: Response
      port: 8080
      patch:
        body:
          type: JSON
          value: '{"error": "corrupted"}'
    duration: 90s

  - name: http_header_corrupt
    fault_type: http_header_corrupt
    chaos_kind: HTTPChaos
    spec:
      mode: one
      target: Response
      port: 8080
      replace:
        headers:
          Content-Type: "application/broken"
    duration: 90s

  # ─── TimeChaos ────────────────────────────────────────────────────────────────

  - name: clock_skew_forward
    fault_type: clock_skew_forward
    chaos_kind: TimeChaos
    spec:
      mode: one
      timeOffset: "1h"
    duration: 60s

  - name: clock_skew_backward
    fault_type: clock_skew_backward
    chaos_kind: TimeChaos
    spec:
      mode: one
      timeOffset: "-1h"
    duration: 60s

  - name: clock_skew_large
    fault_type: clock_skew_large
    chaos_kind: TimeChaos
    spec:
      mode: one
      timeOffset: "24h"
    duration: 60s

  - name: clock_skew_gradual
    fault_type: clock_skew_gradual
    chaos_kind: TimeChaos
    spec:
      mode: one
      timeOffset: "5m"
    duration: 180s

  # ─── K8s API Faults (no Chaos Mesh — handled by runner directly) ──────────────

  - name: resource_quota_exceeded
    fault_type: resource_quota_exceeded
    chaos_kind: k8s_api
    spec:
      action: patch_resource_quota
      cpu_limit: "10m"          # set absurdly low quota
      memory_limit: "1Mi"
    duration: 60s

  - name: network_policy_block
    fault_type: network_policy_block
    chaos_kind: k8s_api
    spec:
      action: apply_network_policy
      deny_ingress_from: all
    duration: 60s

  - name: missing_secret
    fault_type: missing_secret
    chaos_kind: k8s_api
    spec:
      action: delete_secret
      secret_name: auto            # runner creates then deletes a dummy secret
    duration: 60s

  - name: missing_configmap
    fault_type: missing_configmap
    chaos_kind: k8s_api
    spec:
      action: delete_configmap
      configmap_name: auto
    duration: 60s

  - name: hpa_max_capacity
    fault_type: hpa_max_capacity
    chaos_kind: k8s_api
    spec:
      action: patch_hpa_max_replicas
      max_replicas: 1              # cap replicas at 1 then drive load
    duration: 120s

  - name: misconfigured_env
    fault_type: misconfigured_env
    chaos_kind: k8s_api
    spec:
      action: patch_env_var
      var_name: "PRODUCT_CATALOG_SERVICE_ADDR"
      bad_value: "nonexistent-service:9999"
    duration: 60s

  - name: node_not_ready
    fault_type: node_not_ready
    chaos_kind: k8s_api
    spec:
      action: cordon_node          # cordons a node, triggering pod rescheduling
    duration: 60s

  # ─── IOChaos (conditional — only runs if host has /dev/fuse) ─────────────────

  - name: disk_io_latency
    fault_type: disk_io_latency
    chaos_kind: IOChaos
    spec:
      action: latency
      mode: one
      volumePath: /tmp
      delay: "100ms"
    duration: 90s
    requires_fuse: true

  - name: disk_io_error
    fault_type: disk_io_error
    chaos_kind: IOChaos
    spec:
      action: fault
      mode: one
      volumePath: /tmp
      errno: 5                     # EIO — Input/output error
    duration: 60s
    requires_fuse: true

  - name: disk_io_bandwidth_limit
    fault_type: disk_io_bandwidth_limit
    chaos_kind: IOChaos
    spec:
      action: attrOverride
      mode: one
      volumePath: /tmp
      attr:
        size: 1024                 # 1KB max size override — effectively breaks IO
    duration: 90s
    requires_fuse: true
